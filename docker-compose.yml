version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cryptosage_db
    environment:
      POSTGRES_USER: cryptosage
      POSTGRES_PASSWORD: cryptosage_secret
      POSTGRES_DB: cryptosage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptosage -d cryptosage_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cryptosage_backend
    environment:
      DATABASE_URL: postgresql://cryptosage:cryptosage_secret@db:5432/cryptosage_db
      UPLOAD_DIR: /app/uploads
      EXTRACT_DIR: /app/extractions
      MAX_FILE_SIZE_MB: 512
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - firmware_uploads:/app/uploads
      - firmware_extractions:/app/extractions
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cryptosage_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
  firmware_uploads:
  firmware_extractions: